services:
  - type: web
    name: kle-ad-dashboard
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:deploy
    healthCheckPath: /api/health
    disk:
      name: dashboard-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: DB_DIR
        value: /var/data
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_ADMIN_PASSWORD
        sync: false
      - key: SEED_USER_PASSWORD
        sync: false
